<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <span class="score-label">Score</span>
                    <span class="score-value" id="score">0</span>
                    <span class="score-add hidden" id="scoreAdd">+0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Best</span>
                    <span class="score-value" id="best">0</span>
                </div>
            </div>
        </header>
        <div class="toolbar">
            <p class="tagline">Join the tiles, get to <strong>2048!</strong></p>
            <div class="toolbar-btns">
                <button class="icon-btn" id="soundBtn" title="Toggle Sound">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path id="soundWaves" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg>
                </button>
                <button class="icon-btn" id="themeBtn" title="Change Theme">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button class="icon-btn" id="leaderboardBtn" title="Leaderboard">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H2v12h4V9zM14 4h-4v17h4V4zM22 13h-4v8h4v-8z"/></svg>
                </button>
            </div>
        </div>
        <button class="new-game-btn" id="newGameBtn">New Game</button>
        <div class="board" id="board">
            <div class="grid-bg">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="tile-container" id="tileContainer"></div>
            <div class="overlay hidden" id="overlay">
                <div class="overlay-text" id="overlayText">Game Over!</div>
                <button class="new-game-btn" id="retryBtn">Try Again</button>
            </div>
        </div>
        <p class="instructions">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles.</p>

        <!-- Leaderboard Modal -->
        <div class="modal-overlay hidden" id="leaderboardModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>Leaderboard</h2>
                    <button class="modal-close" id="closeLeaderboard">&times;</button>
                </div>
                <div class="modal-body">
                    <table class="lb-table">
                        <thead>
                            <tr><th>#</th><th>Score</th><th>Best Tile</th><th>Date</th></tr>
                        </thead>
                        <tbody id="lbBody"></tbody>
                    </table>
                    <p class="lb-empty hidden" id="lbEmpty">No games played yet. Start playing!</p>
                    <button class="clear-btn" id="clearLbBtn">Clear History</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
